name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to attach release assets on tag builds
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the same image compose uses, with layer caching so the ~1 GB
      # Godot template download only happens when the Dockerfile changes.
      - name: Build export image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: godot-playground-export:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Linux release
        run: docker compose run --rm export

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: builds/linux/

      - name: Attach builds to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: builds/linux/*
